<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Yoshi Hill Run</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{overflow:hidden;touch-action:none;-webkit-touch-callout:none;background:#8BC34A}
  body{display:flex;align-items:flex-start;justify-content:center;min-height:100vh}
  .gw{position:relative;width:100vw;height:100vh;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
  canvas{
    display:block;width:100%;height:100%;
    image-rendering:pixelated;image-rendering:crisp-edges;
  }

  .touch-zones{display:none;position:absolute;inset:0;z-index:1;pointer-events:none}
  .touch-zone{position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center;
    font:300 28px/1 'DM Mono',monospace;color:rgba(255,255,255,.08);transition:background .15s,color .15s}
  .touch-zone.left{left:0;width:33.3%}
  .touch-zone.mid{left:33.3%;width:33.4%}
  .touch-zone.right{right:0;width:33.3%}
  .touch-zone.active{background:rgba(255,255,255,.06);color:rgba(255,255,255,.15)}
  @media(hover:none)and(pointer:coarse){.touch-zones.playing{display:flex}}

  .ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(120,180,60,.92);backdrop-filter:blur(2px);z-index:10;text-align:center;transition:opacity .5s}
  .ov.hidden{opacity:0;pointer-events:none}
  .ov h1{font:500 28px/1 'DM Mono',monospace;color:#fff;letter-spacing:.08em;margin-bottom:2px;text-shadow:2px 2px 0 rgba(0,0,0,.2)}
  .ov .sub{font:300 10px/1 'DM Mono',monospace;color:rgba(255,255,255,.6);letter-spacing:.16em;text-transform:uppercase;margin-bottom:28px}
  .ov .pr{font:400 13px/1.8 'DM Mono',monospace;color:#fff;letter-spacing:.06em;animation:blink 1.2s ease-in-out infinite}
  .ov .ks{font:300 10px/2 'DM Mono',monospace;color:rgba(255,255,255,.5);margin-top:12px}
  .ov .ks kbd{display:inline-block;border:1px solid rgba(255,255,255,.3);border-radius:3px;padding:2px 7px;font-size:10px;background:rgba(255,255,255,.1);color:#fff}
  .ov .rsn{font:400 10px/1 'DM Mono',monospace;letter-spacing:.14em;color:rgba(255,255,255,.6);text-transform:uppercase;margin-bottom:4px}
  .ov .fs{font:500 42px/1.2 'DM Mono',monospace;color:#fff;letter-spacing:.04em;text-shadow:2px 2px 0 rgba(0,0,0,.2)}
  .ov .fs small{font-size:14px;font-weight:300;color:rgba(255,255,255,.6);letter-spacing:.08em}
  .ov .bl{font:400 11px/1 'DM Mono',monospace;color:rgba(255,255,255,.7);margin:6px 0 24px}
  .ov .em{font:400 12px/1.6 'DM Mono',monospace;color:#FFFDE7;margin-bottom:10px}
  .vt{margin-bottom:20px;opacity:.25}

  .hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:center;gap:40px;
    padding:10px 20px;font:500 11px/1 'DM Mono',monospace;letter-spacing:.1em;color:rgba(255,255,255,.7);
    pointer-events:none;z-index:2;text-shadow:1px 1px 0 rgba(0,0,0,.2)}
  .hud .v{color:#fff;font-weight:500}
  .hud .fw.warn{animation:pulse .5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  .warn-banner{position:absolute;top:44px;left:50%;transform:translateX(-50%);
    font:500 12px/1 'DM Mono',monospace;letter-spacing:.16em;color:#fff;background:rgba(0,0,0,.3);
    padding:6px 22px;pointer-events:none;z-index:3;opacity:0;transition:opacity .4s;text-transform:uppercase}
  .warn-banner.show{opacity:1;animation:warnPulse 1s infinite}
  @keyframes warnPulse{0%,100%{opacity:.85}50%{opacity:.4}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
</style>
</head>
<body>
<div class="gw" id="gw">
  <canvas id="c"></canvas>
  <div class="touch-zones" id="touchZones">
    <div class="touch-zone left" id="tzL">◂</div>
    <div class="touch-zone mid" id="tzM">↑</div>
    <div class="touch-zone right" id="tzR">▸</div>
  </div>
  <div class="hud">
    <span>DIST <span class="v" id="hD">0</span>m</span>
    <span class="fw" id="hFw">FUEL <span class="v" id="hF">100</span>%</span>
    <span>BEST <span class="v" id="hB">0</span>m</span>
  </div>
  <div class="warn-banner" id="warnBanner">⚠ SOMETHING IS COMING ⚠</div>

  <div class="ov" id="titOv">
    <svg class="vt" width="180" height="54" viewBox="0 0 740 335" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5">
      <path d="M219.6,284.73l-6.28-26.28c-3.15-13.15-10.84-24.48-21.67-31.89-3.84-2.63-13.06-4.15-15.28-4.15h-46.62c-3.52,0-8.47,1.92-11.11,3.07-9.78,4.28-17.17,12.66-20.28,22.98l-5.65,19.29h-56.5v2.08H.12v-19.46h24.57l-14.19-77.2h1.74v-16.54h-2.77L75.31,20.89h51.13l6.68,6.24h130.09v-6.24h18.77v6.24h181.82l3.68-6.24h137.15l27.31,23.31v4.69l67.34,84.84h9.11l23.57,27.62-2.98,53.11h-20.83c-4.49,0-8.65,2.44-10.85,6.36l-11.5,20.56h37.68l-.69,5.88h17.17v12.73c-.22,1.56-1.09,4.8-2.53,5.52-2.04.96-24.84,5.06-38.84,7.43h-7.76l.37-6.15-73.86,10.15-20.22-42.57c-3.44-7.27-10.87-11.96-18.92-11.96h-42.52c-2.52,0-14.8,2.37-19.2,6.32-13.36,11.98-21.4,28.61-22.62,46.84l-.62,9.15H219.6Z"/>
      <path d="M553.32,334.58c-28.46,0-51.61-23.15-51.61-51.61s23.15-51.61,51.61-51.61,51.61,23.15,51.61,51.61-23.15,51.61-51.61,51.61Z"/>
      <path d="M153.86,334.58c-28.46,0-51.61-23.15-51.61-51.61s23.15-51.61,51.61-51.61,51.61,23.15,51.61,51.61-23.15,51.61-51.61,51.61Z"/>
    </svg>
    <h1>YOSHI HILL RUN</h1>
    <div class="sub">1983 VW Vanagon GL Westfalia · downhill</div>
    <div class="pr" id="startPrompt">press any key or tap to start</div>
    <div class="ks" id="ctrlHint"><kbd>←</kbd> <kbd>→</kbd> steer · <kbd>↑</kbd> boost · <kbd>SPACE</kbd> jump</div>
  </div>

  <div class="ov hidden" id="endOv">
    <div class="em" id="eMsg"></div>
    <div class="rsn" id="eRsn">CRASHED</div>
    <div class="fs" id="eSc">0 <small>m</small></div>
    <div class="bl" id="eBst">BEST 0 m</div>
    <div class="pr">press any key or tap to retry</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  YOSHI HILL RUN v4 · true pixel · low-res canvas
// ═══════════════════════════════════════════════

// Internal pixel resolution — everything renders here, CSS scales up
const IW = 384, IH = 216;

const cv = document.getElementById('c');
const cx = cv.getContext('2d');
cv.width = IW; cv.height = IH;
// Disable smoothing for crisp pixels
cx.imageSmoothingEnabled = false;

const W = IW, H = IH;

// Palette
const P = {
  bg:'#8BC34A',       // light green field
  tuft:'#7DB33E',     // slightly darker grass tuft
  rock:'#6B6B60',     // dark enough to contrast on green
  rockHi:'#8A8A7C',   // rock highlight
  treeDk:'#2E7D14',   // dark tree green
  treeLt:'#4CAF30',   // light tree green
  trunk:'#5D4037',    // brown trunk
  ink:'#222',
  signal:'#E83A0C',
  amber:'#F0AD3B',
  // van
  vBody:'#F0ECD0',    // ivory
  vBodyDk:'#D8D4B8',  // ivory shadow side
  vRoof:'#E0DCC4',    // pop-top
  vGlass:'#4A6A7A',   // dark glass
  vGlassHi:'#6A8A9A',
  vStripe:'#D35400',  // orange stripe
  vWheel:'#333',
  vOutline:'#3A3630',
  // yoshi
  yG:'#4CAF50', yGd:'#2E7D32', yGl:'#81C784',
  yW:'#FFFDE7', yR:'#E83A0C', yO:'#FF8A65',
};

// ── pixel helper: draw a "sprite" from a 2D color array ──
function drawSprite(data, x, y, flipX) {
  cx.save();
  cx.translate(Math.round(x), Math.round(y));
  if (flipX) cx.scale(-1, 1);
  for (let row = 0; row < data.length; row++) {
    for (let col = 0; col < data[row].length; col++) {
      const c = data[row][col];
      if (c) {
        cx.fillStyle = c;
        cx.fillRect(col - Math.floor(data[0].length / 2), row - Math.floor(data.length / 2), 1, 1);
      }
    }
  }
  cx.restore();
}

// ── VAN SPRITE (14w x 14h pixels — stubby boxy T3 Vanagon) ──
// Van faces DOWN (front=bottom). Ivory body, dark glass, orange stripe, pop-top, wheels.
const _=null, O=P.vOutline, B=P.vBody, D=P.vBodyDk, R=P.vRoof, G=P.vGlass, H2=P.vGlassHi,
      S=P.vStripe, WH=P.vWheel, A=P.amber, SG=P.signal, TL='#cc2200';

const vanSprite = [
  // row 0: rear edge + taillights
  [_,_,O,O,SG,O,O,O,O,SG,O,O,_,_],
  // row 1: rear window
  [_,_,O,G,G,G,G,G,G,G,G,O,_,_],
  // row 2-3: pop-top
  [_,WH,O,R,R,R,R,R,R,R,R,O,WH,_],
  [_,WH,O,R,R,R,R,R,R,R,R,O,WH,_],
  // row 4: stripe
  [_,_,O,S,S,S,S,S,S,S,S,O,_,_],
  // row 5-7: body
  [_,_,O,B,B,B,D,D,B,B,B,O,_,_],
  [_,_,O,B,B,B,D,D,B,B,B,O,_,_],
  [_,_,O,B,B,B,B,B,B,B,B,O,_,_],
  // row 8: stripe
  [_,_,O,S,S,S,S,S,S,S,S,O,_,_],
  // row 9-10: lower body + wheels
  [_,WH,O,B,B,B,B,B,B,B,B,O,WH,_],
  [_,WH,O,B,B,B,B,B,B,B,B,O,WH,_],
  // row 11: windshield
  [_,_,O,G,G,H2,G,G,H2,G,G,O,_,_],
  // row 12: headlights + front
  [_,_,O,A,A,B,B,B,B,A,A,O,_,_],
  [_,_,_,O,O,O,O,O,O,O,O,_,_,_],
];

// ── TREE SPRITE (8w x 14h) ──
const TK=P.trunk, TD=P.treeDk, TL2=P.treeLt;
const treeSprite = [
  [_,_,_,TD,TD,_,_,_],
  [_,_,TD,TD,TD,TD,_,_],
  [_,TD,TD,TL2,TD,TD,TD,_],
  [TD,TD,TL2,TD,TD,TD,TD,TD],
  [_,_,_,TD,TD,_,_,_],
  [_,_,TD,TD,TD,TD,_,_],
  [_,TD,TD,TL2,TD,TD,TD,_],
  [TD,TD,TD,TL2,TD,TD,TD,TD],
  [_,TD,TD,TD,TD,TD,TD,_],
  [_,_,TD,TD,TD,TD,_,_],
  [_,_,_,TK,TK,_,_,_],
  [_,_,_,TK,TK,_,_,_],
  [_,_,_,TK,TK,_,_,_],
];

// ── ROCK SPRITE (8w x 5h) ──
const RK=P.rock, RH=P.rockHi;
const rockSprite = [
  [_,_,RH,RH,RH,RH,_,_],
  [_,RH,RH,RH,RH,RK,RK,_],
  [RK,RH,RH,RK,RK,RK,RK,RK],
  [RK,RK,RK,RK,RK,RK,RK,_],
  [_,_,RK,RK,RK,RK,_,_],
];

// ── GAS CAN SPRITE (6w x 8h) ──
const SIG=P.signal, WHT='#fff';
const gasSprite = [
  [_,_,SIG,SIG,_,_],
  [_,SIG,WHT,SIG,SIG,_],
  [_,SIG,SIG,SIG,SIG,_],
  [SIG,SIG,WHT,SIG,SIG,SIG],
  [SIG,SIG,SIG,SIG,SIG,SIG],
  [SIG,SIG,WHT,WHT,SIG,SIG],
  [SIG,SIG,SIG,SIG,SIG,SIG],
  [_,SIG,SIG,SIG,SIG,_],
];

// ── WRENCH SPRITE (7w x 7h) ──
const AM=P.amber, AMD='#C48A2A';
const wrenchSprite = [
  [_,_,_,_,_,AM,AM],
  [_,_,_,_,AM,AMD,AM],
  [_,_,_,AM,AM,AM,_],
  [_,_,AM,AM,_,_,_],
  [_,AM,AM,_,_,_,_],
  [AM,AMD,AM,_,_,_,_],
  [AM,AM,_,_,_,_,_],
];

// ── STATE ──
const titOv=document.getElementById('titOv'),endOv=document.getElementById('endOv');
const wBan=document.getElementById('warnBanner');
const hD=document.getElementById('hD'),hF=document.getElementById('hF'),hB=document.getElementById('hB');
const hFw=document.getElementById('hFw');
const eMsg=document.getElementById('eMsg'),eRsn=document.getElementById('eRsn');
const eSc=document.getElementById('eSc'),eBst=document.getElementById('eBst');
const touchZones=document.getElementById('touchZones');
const tzL=document.getElementById('tzL'),tzM=document.getElementById('tzM'),tzR=document.getElementById('tzR');

let mode='title', best=0;
let van, obs, pix, parts, dust;
let spd, dist, fuel, tilt, inv;
let jumpT, jumpCool;
let yoshi, yoshiWarned, yoshiActive, yoshiAte;
let keys={}, shakeT=0, deathTime=0, frame=0;
let touchDir=0, activeTouches={};

const YOSHI_WARN=500, YOSHI_DIST=600;

function init() {
  van = { x: W/2, y: H*0.22, w: 12, h: 12, vx: 0 };
  obs=[]; pix=[]; parts=[]; dust=[];
  spd=1.8; dist=0; fuel=100; tilt=0; inv=0; shakeT=0; frame=0;
  jumpT=0; jumpCool=0;
  yoshi=null; yoshiWarned=false; yoshiActive=false; yoshiAte=false;
  wBan.classList.remove('show');
  // pre-populate terrain — safe zone of 60px below van
  const safeY = van.y + 60;
  for (let i=0; i<14; i++) spawnTerrain(safeY + Math.random()*(H - safeY + 120));
}

// ── TERRAIN ──

function spawnTerrain(atY) {
  const y = atY !== undefined ? atY : H + 10 + Math.random()*40;
  const r = Math.random();
  if (r < .35) {
    obs.push({ t:'tree', x: 10+Math.random()*(W-20), y, hw:3, hh:5 });
  } else if (r < .55) {
    obs.push({ t:'rock', x: 14+Math.random()*(W-28), y, hw:3, hh:2 });
  } else if (r < .65) {
    // tree pair
    const bx = 20+Math.random()*(W-40);
    obs.push({ t:'tree', x:bx-10, y:y+Math.random()*8, hw:3, hh:5 });
    obs.push({ t:'tree', x:bx+10, y:y+Math.random()*8, hw:3, hh:5 });
  } else if (r < .72) {
    obs.push({ t:'rock', x: 14+Math.random()*(W-28), y, hw:3, hh:2 });
    obs.push({ t:'rock', x: 14+Math.random()*(W-28), y:y+4+Math.random()*6, hw:3, hh:2 });
  } else {
    // bush (decoration, no collision)
    obs.push({ t:'bush', x: 8+Math.random()*(W-16), y, hw:0, hh:0 });
  }
}

function spawnPickup() {
  const x = 20+Math.random()*(W-40);
  pix.push({ t: Math.random()<.7?'gas':'wrench', x, y:H+8, w:4, h:4 });
}

// ── DRAW HELPERS ──

function drawPixTree(x, y) { drawSprite(treeSprite, x, y); }
function drawPixRock(x, y) { drawSprite(rockSprite, x, y); }
function drawPixGas(x, y)  { drawSprite(gasSprite, x, y + Math.round(Math.sin(frame*.1)*1.5)); }
function drawPixWrench(x, y) { drawSprite(wrenchSprite, x, y + Math.round(Math.sin(frame*.1+1)*1.5)); }

function drawPixBush(x, y) {
  cx.fillStyle = P.treeLt;
  cx.fillRect(Math.round(x)-2, Math.round(y)-1, 5, 3);
  cx.fillStyle = P.treeDk;
  cx.fillRect(Math.round(x)-1, Math.round(y)-2, 3, 1);
}

function drawPixVan(x, y) { drawSprite(vanSprite, Math.round(x), Math.round(y)); }

// ── YOSHI DINO (pixel art, ~16x20) ──
function drawPixYoshi(x, y) {
  const YG=P.yG, YD=P.yGd, YL=P.yGl, YW=P.yW, YR=P.yR, YO=P.yO;
  const leg = Math.sin(frame*.3) > 0;
  cx.save(); cx.translate(Math.round(x), Math.round(y));

  // legs (animated)
  cx.fillStyle = YG;
  if (leg) {
    cx.fillRect(-5, 8, 3, 4); cx.fillRect(3, 6, 3, 4);
  } else {
    cx.fillRect(-5, 6, 3, 4); cx.fillRect(3, 8, 3, 4);
  }
  // boots
  cx.fillStyle = YO;
  if (leg) {
    cx.fillRect(-6, 11, 4, 2); cx.fillRect(2, 9, 4, 2);
  } else {
    cx.fillRect(-6, 9, 4, 2); cx.fillRect(2, 11, 4, 2);
  }

  // shell
  cx.fillStyle = YR;
  cx.fillRect(-6, -3, 13, 9);
  cx.fillStyle = '#B71C1C';
  cx.fillRect(-5, -1, 11, 5);

  // belly
  cx.fillStyle = YW;
  cx.fillRect(-4, 0, 9, 8);

  // body
  cx.fillStyle = YG;
  cx.fillRect(-6, -5, 13, 5);
  cx.fillRect(-5, 0, 2, 8);
  cx.fillRect(4, 0, 2, 8);

  // head
  cx.fillStyle = YG;
  cx.fillRect(-5, -11, 11, 7);
  // snout
  cx.fillStyle = YL;
  cx.fillRect(-4, -7, 9, 4);
  // nostrils
  cx.fillStyle = YD;
  cx.fillRect(-2, -5, 1, 1);
  cx.fillRect(2, -5, 1, 1);
  // eyes
  cx.fillStyle = '#fff';
  cx.fillRect(-4, -11, 3, 3);
  cx.fillRect(2, -11, 3, 3);
  // pupils
  cx.fillStyle = '#111';
  cx.fillRect(-3, -10, 2, 2);
  cx.fillRect(3, -10, 2, 2);
  // crest
  cx.fillStyle = YR;
  cx.fillRect(-2, -13, 5, 2);

  cx.restore();
}

// ── PARTICLES (pixel-scale) ──
function burst(x,y,color,n) {
  for(let i=0;i<n;i++) parts.push({x,y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,
    life:12+Math.random()*12,color,r:1});
}
function addDust(x,y) {
  dust.push({x:x+(Math.random()-.5)*4,y,vx:(Math.random()-.5)*.5,
    vy:Math.random()*.3,life:10+Math.random()*8,ml:18,r:1});
}

// ── UPDATE ──

function update() {
  if (mode!=='play') return;
  frame++;

  let si=0, ai=0;
  if (keys['ArrowLeft']||keys['KeyA']||touchDir<0) si=-1;
  if (keys['ArrowRight']||keys['KeyD']||touchDir>0) si=1;
  if (keys['ArrowUp']||keys['KeyW']) ai=1;
  if (keys['ArrowDown']||keys['KeyS']) ai=-1;

  spd=Math.min(spd+.001,5);
  if (ai>0) spd=Math.min(spd+.04,6.5);
  if (ai<0) spd=Math.max(spd-.04,1);

  van.vx+=si*.45;
  van.vx*=.85;
  van.x+=van.vx;
  tilt=van.vx;
  van.x=Math.max(10,Math.min(W-10,van.x));

  // jump
  if(jumpCool>0)jumpCool--;
  if(jumpT>0)jumpT--;
  if((keys['Space']||keys['KeyJ'])&&jumpT===0&&jumpCool===0){jumpT=30;jumpCool=42;}
  const jumpH=jumpT>0?Math.sin((jumpT/30)*Math.PI)*18:0;
  const airborne=jumpT>0;

  const scroll=spd*1;
  dist+=spd*.22;
  fuel-=.012+spd*.0015;
  if(fuel<=0&&!yoshiActive){fuel=0;die('OUT OF FUEL');return;}
  if(fuel<=0)fuel=0;

  for(const o of obs)o.y-=scroll;
  for(const p of pix)p.y-=scroll;
  obs=obs.filter(o=>o.y>-20);
  pix=pix.filter(p=>p.y>-10&&!p.dead);

  const bot=obs.length?Math.max(...obs.map(o=>o.y)):0;
  if(bot<H+30){spawnTerrain(H+10+Math.random()*60);if(Math.random()<.4)spawnTerrain(H+30+Math.random()*60);}

  if(Math.random()<.009)spawnPickup();

  // yoshi chase
  if(dist>=YOSHI_WARN&&!yoshiWarned){yoshiWarned=true;wBan.classList.add('show');}
  if(dist>=YOSHI_DIST&&!yoshiActive){
    yoshiActive=true;wBan.textContent='🦖 YOSHI IS HERE 🦖';
    yoshi={x:van.x,y:-20,spd:spd+.2};
    fuel=Math.min(100,fuel+15);
  }
  if(yoshiActive&&yoshi&&!yoshiAte){
    yoshi.x+=(van.x-yoshi.x)*.025;
    yoshi.spd=Math.max(yoshi.spd,spd*.85+1.2);
    yoshi.y+=(yoshi.spd-spd)*.8+.4;
    if(frame%6===0){addDust(yoshi.x-4,yoshi.y+10);addDust(yoshi.x+4,yoshi.y+10);}
    if(!airborne&&Math.abs(yoshi.x-van.x)<10&&Math.abs(yoshi.y-van.y)<14){
      yoshiAte=true;shakeT=15;burst(van.x,van.y,P.yG,15);burst(van.x,van.y,P.signal,10);
      die('EATEN BY YOSHI');
    }
  }

  // collisions
  if(inv>0)inv--;
  if(inv<=0&&!airborne&&!yoshiAte){
    for(const o of obs){
      if(o.hw===0)continue;
      if(Math.abs(van.x-o.x)<(van.w*.35+o.hw)&&Math.abs(van.y-o.y)<(van.h*.35+o.hh)){
        die('CRASHED');return;
      }
    }
  }

  for(const p of pix){
    if(p.dead)continue;
    if(Math.abs(van.x-p.x)<8&&Math.abs(van.y-p.y)<8){
      p.dead=true;
      if(p.t==='gas')fuel=Math.min(100,fuel+30);else inv=100;
      burst(p.x,p.y,p.t==='gas'?P.signal:P.amber,6);
    }
  }

  if(spd>2.5&&Math.random()<.3){addDust(van.x-5,van.y-8);addDust(van.x+5,van.y-8);}

  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.life--;});
  parts=parts.filter(p=>p.life>0);
  dust.forEach(d=>{d.x+=d.vx;d.y+=d.vy;d.life--;});
  dust=dust.filter(d=>d.life>0);
  if(shakeT>0)shakeT--;

  hD.textContent=Math.floor(dist);
  hF.textContent=Math.max(0,Math.floor(fuel));
  hFw.classList.toggle('warn',fuel<20);
}

function die(reason) {
  mode='dead';shakeT=Math.max(shakeT,12);deathTime=Date.now();
  activeTouches={};touchDir=0;keys['ArrowUp']=false;keys['Space']=false;
  touchZones.classList.remove('playing');
  if(!yoshiAte){burst(van.x,van.y,P.signal,12);burst(van.x,van.y,P.amber,8);}
  if(Math.floor(dist)>best)best=Math.floor(dist);
  hB.textContent=best;
  setTimeout(()=>{
    eMsg.textContent=yoshiAte?'nom nom nom':'';
    eMsg.style.display=yoshiAte?'':'none';
    eRsn.textContent=reason;
    eSc.innerHTML=Math.floor(dist)+' <small>m</small>';
    eBst.textContent='BEST '+best+' m';
    endOv.classList.remove('hidden');
    wBan.classList.remove('show');
  },yoshiAte?800:500);
}

// ── DRAW ──

function draw() {
  cx.save();
  if(shakeT>0)cx.translate(Math.round((Math.random()-.5)*shakeT*.5),Math.round((Math.random()-.5)*shakeT*.5));

  // flat green field
  cx.fillStyle=P.bg;
  cx.fillRect(0,0,W,H);

  // sparse pixel grass tufts
  cx.fillStyle=P.tuft;
  const sy=dist*8;
  for(let gy=-10;gy<H+10;gy+=24){
    for(let gx=8;gx<W;gx+=32){
      const ox=((gy/24|0)%2)*16;
      const px=gx+ox+((gx*7+gy*13)%18)-9;
      const py=gy+(sy%24)+((gx*3+gy*11)%14)-7;
      if(py>-2&&py<H+2){
        cx.fillRect(px,py,1,2);
        if((gx+gy)%3===0)cx.fillRect(px+1,py+1,1,1);
      }
    }
  }

  // dust
  for(const d of dust){
    cx.globalAlpha=(d.life/d.ml)*.4;
    cx.fillStyle=P.tuft;
    cx.fillRect(Math.round(d.x),Math.round(d.y),d.r,d.r);
  }
  cx.globalAlpha=1;

  // depth sort
  const all=[
    ...obs.map(o=>({...o,cat:'ob'})),
    ...pix.filter(p=>!p.dead).map(p=>({...p,cat:'px'})),
  ];
  if(!yoshiAte)all.push({x:van.x,y:van.y,cat:'van'});
  if(yoshiActive&&yoshi)all.push({x:yoshi.x,y:yoshi.y,cat:'yoshi'});
  all.sort((a,b)=>a.y-b.y);

  const jh = jumpT>0?Math.sin((jumpT/30)*Math.PI)*18:0;

  for(const o of all){
    if(o.y<-20||o.y>H+20)continue;
    switch(o.cat){
      case 'ob':
        if(o.t==='tree')drawPixTree(o.x,o.y);
        else if(o.t==='rock')drawPixRock(o.x,o.y);
        else drawPixBush(o.x,o.y);
        break;
      case 'px':
        if(o.t==='gas')drawPixGas(o.x,o.y);
        else drawPixWrench(o.x,o.y);
        break;
      case 'van':
        if(inv>0&&Math.floor(inv/4)%2)cx.globalAlpha=.35;
        if(jh>0){
          // ground shadow
          cx.fillStyle='rgba(0,0,0,.15)';
          const ss=1-jh/25;
          cx.fillRect(Math.round(van.x)-Math.round(5*ss),Math.round(van.y)+8,Math.round(10*ss),Math.round(3*ss));
          drawPixVan(van.x, van.y-jh);
        } else {
          drawPixVan(van.x, van.y);
        }
        cx.globalAlpha=1;
        break;
      case 'yoshi':
        drawPixYoshi(o.x,o.y);
        break;
    }
  }

  // particles
  for(const p of parts){
    cx.globalAlpha=Math.min(1,p.life/12);
    cx.fillStyle=p.color;
    cx.fillRect(Math.round(p.x),Math.round(p.y),p.r,p.r);
  }
  cx.globalAlpha=1;

  // low fuel
  if(fuel<20&&fuel>0&&mode==='play'&&!yoshiActive){
    if(Math.floor(frame/15)%2===0){
      cx.fillStyle=P.signal;
      cx.font='5px monospace';cx.textAlign='center';
      cx.fillText('LOW FUEL',W/2,H-6);
    }
  }

  cx.restore();
}

// ── INPUT ──

const isMobile=matchMedia('(hover:none)and(pointer:coarse)').matches;
if(isMobile){
  document.getElementById('startPrompt').textContent='tap to start';
  document.getElementById('ctrlHint').innerHTML='left · right · center = jump';
}

function goFullscreen(){
  const el=document.getElementById('gw');
  if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
}

function tryStart(){
  if(mode==='dead'&&Date.now()-deathTime<600)return;
  if(isMobile)goFullscreen();
  init();mode='play';
  titOv.classList.add('hidden');endOv.classList.add('hidden');
  touchZones.classList.add('playing');
}

document.addEventListener('keydown',e=>{keys[e.code]=true;if(mode!=='play')tryStart();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

function classifyTouch(cx2){
  const w=cv.getBoundingClientRect().width;
  const r=cx2/w;
  if(r<.33)return'left';if(r>.67)return'right';return'boost';
}
function updateTouchState(){
  touchDir=0;let jumping=false;
  for(const id in activeTouches){
    const z=activeTouches[id];
    if(z==='left')touchDir=-1;if(z==='right')touchDir=1;if(z==='boost')jumping=true;
  }
  keys['Space']=jumping;
  tzL.classList.toggle('active',!!Object.values(activeTouches).find(z=>z==='left'));
  tzR.classList.toggle('active',!!Object.values(activeTouches).find(z=>z==='right'));
  tzM.classList.toggle('active',jumping);
}
cv.addEventListener('touchstart',e=>{e.preventDefault();if(mode!=='play'){tryStart();return;}
  for(const t of e.changedTouches)activeTouches[t.identifier]=classifyTouch(t.clientX);updateTouchState();},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();
  for(const t of e.changedTouches)activeTouches[t.identifier]=classifyTouch(t.clientX);updateTouchState();},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();
  for(const t of e.changedTouches)delete activeTouches[t.identifier];updateTouchState();},{passive:false});
cv.addEventListener('touchcancel',e=>{for(const t of e.changedTouches)delete activeTouches[t.identifier];updateTouchState();});
document.querySelectorAll('.ov').forEach(el=>{el.addEventListener('touchstart',e=>{e.preventDefault();if(mode!=='play')tryStart();},{passive:false});});
document.addEventListener('fullscreenchange',()=>{});

// ── LOOP ──
init();
(function loop(){update();draw();requestAnimationFrame(loop);})();
</script>
